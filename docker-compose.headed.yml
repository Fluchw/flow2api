version: '3.8'

services:
  flow2api-headed:
    build:
      context: .
      dockerfile: Dockerfile.headed
    image: flow2api:headed
    container_name: flow2api-headed
    ports:
      - "1234:1234"
      - "5900:5900"
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
      - ./config/setting.toml:/app/config/setting.toml
      - ./static/manage.html:/app/static/manage.html
      - ./browser_data:/app/browser_data
    environment:
      - PYTHONUNBUFFERED=1
      - ALLOW_DOCKER_HEADED_CAPTCHA=true
      - DISPLAY=:99
      - XVFB_WHD=1920x1080x24
      - TZ=Asia/Shanghai
      - VNC_PORT=5900
    shm_size: "2gb"
    restart: unless-stopped
